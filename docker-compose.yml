services:
  postgres:
    image: postgres:15-alpine
    container_name: gym-postgres
    environment:
      POSTGRES_DB: mygymroutine_hibernate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: usuario
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mygymroutine_hibernate"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gym-network

  redis:
    image: redis:7-alpine
    container_name: gym-redis
    ports:
      - "9669:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - gym-network

  app:
    build: .
    container_name: gym-spring-app
    ports:
      - "9000:9000"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mygymroutine_hibernate
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: usuario
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gym-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  gym-network:
    driver: bridge