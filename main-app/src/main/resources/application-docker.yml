spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/mygymroutine_hibernate}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:usuario}
  jpa:
    hibernate:
      ddl-auto: update
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:disabled}
            client-secret: ${GOOGLE_CLIENT_SECRET:disabled}
          github:
            client-id: ${GITHUB_CLIENT_ID:disabled}
            client-secret: ${GITHUB_CLIENT_SECRET:disabled}

redis:
  host: ${REDIS_HOST:redis}
  port: ${REDIS_PORT:6379}
  username: ${REDIS_USERNAME:}
  password: ${REDIS_PASSWORD:}

application:
  security:
    jwt:
      secret-key: ${APPLICATION_SECURITY_JWT_SECRET_KEY}
